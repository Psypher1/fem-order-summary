<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- displays site properly based on user's device -->

		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./images/favicon-32x32.png"
		/>
		<link rel="stylesheet" href="style.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
			rel="stylesheet"
		/>

		<title>CUBE css Frontend Mentor | Order summary card</title>

		<!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
		<style>
			.attribution {
				font-size: 0.6875rem;
				text-align: center;
			}
			.attribution a {
				color: hsl(228, 45%, 44%);
			}
		</style>
	</head>
	<body>
		<!-- Order Summary You can now listen to millions of songs, audiobooks, and
		podcasts on any device anywhere you like! Annual Plan $59.99/year Change
		Proceed to Payment Cancel Order -->
		<main>
			<div class="card bg-white">
				<img
					src="./images/illustration-hero.svg"
					class="card__image"
					alt=""
				/>
				<div class="card_content p-48">
					<h3>Order Summary</h3>
					<p>
						You can now listen to millions of songs, audiobooks, and
						podcasts on any device anywhere you like!
					</p>

					<!-- plan -->
					<div>
						<div>
							<img src="./images/icon-music.svg" alt="" />
						</div>
						<div>
							<p>Annual Plan</p>
							<p>$59.99/year</p>
						</div>
						<button href="">Change</button>
					</div>

					<button>Proceed to Payment</button>
					<button>Cancel Order</button>
				</div>
			</div>
		</main>

		<!-- <footer class="attribution">
			Challenge by
			<a href="https://www.frontendmentor.io?ref=challenge"
				>Frontend Mentor</a
			>. Coded by <a href="#">James 'Dante' Midzi</a>.
		</footer> -->
	</body>
</html>
